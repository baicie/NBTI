name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nbti-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          timeout: 15m
          script: |
            set -e

            configure_mirror() {
              echo "Configuring Docker mirror..."
              sudo mkdir -p /etc/docker
              printf '%s\n' '{"registry-mirrors":["https://mirror.ccs.tencentyun.com"]}' | sudo tee /etc/docker/daemon.json
              sudo systemctl daemon-reload 2>/dev/null || true
              sudo systemctl restart docker 2>/dev/null || true
              echo "Mirror configured"
            }

            for i in 1 2 3 4 5; do
              echo "Attempt $i: Pulling image..."
              if docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} && \
                 docker pull ${{ env.IMAGE_NAME }}:main; then
                echo "Image pulled successfully"
                break
              fi
              echo "Pull failed, retrying in $((i * 20)) seconds..."
              sleep $((i * 20))
              if [ $i -eq 2 ]; then
                configure_mirror
              fi
            done

            docker stop nbti-web-staging 2>/dev/null || true
            docker rm nbti-web-staging 2>/dev/null || true
            docker run -d \
              --name nbti-web-staging \
              -p 3001:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              ${{ env.IMAGE_NAME }}:main
            docker image prune -f

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          timeout: 15m
          script: |
            set -e

            configure_mirror() {
              echo "Configuring Docker mirror..."
              sudo mkdir -p /etc/docker
              printf '%s\n' '{"registry-mirrors":["https://mirror.ccs.tencentyun.com"]}' | sudo tee /etc/docker/daemon.json
              sudo systemctl daemon-reload 2>/dev/null || true
              sudo systemctl restart docker 2>/dev/null || true
              echo "Mirror configured"
            }

            for i in 1 2 3 4 5; do
              echo "Attempt $i: Pulling image..."
              if docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }} && \
                 docker pull ${{ env.IMAGE_NAME }}:${{ github.ref_name }}; then
                echo "Image pulled successfully"
                break
              fi
              echo "Pull failed, retrying in $((i * 20)) seconds..."
              sleep $((i * 20))
              if [ $i -eq 2 ]; then
                configure_mirror
              fi
            done

            docker stop nbti-web 2>/dev/null || true
            docker rm nbti-web 2>/dev/null || true
            docker run -d \
              --name nbti-web \
              -p 3000:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker image prune -f

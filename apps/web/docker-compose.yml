services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: nbti-web:latest
    container_name: nbti-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: [CMD, node, -e, 'http.get(`http://localhost:3000`)']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
